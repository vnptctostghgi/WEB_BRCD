<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Đăng nhập · {{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              fontFamily: { sans: ["Be Vietnam Pro", "Inter", "ui-sans-serif", "system-ui"] },
              colors: { vnpt: { 50: "#effaff", 100: "#dff5ff", 500: "#0ea5e9", 600: "#0284c7", 700: "#0369a1", 900: "#0c4a6e", 950: "#082f49" } },
            },
          },
        },
      };
      if (localStorage.theme === "dark") document.documentElement.classList.add("dark");
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css?v=12" />
  </head>
  <body class="min-h-screen bg-vnpt-50 text-slate-950 antialiased dark:bg-slate-950 dark:text-white">
    <main class="min-h-screen p-3 sm:p-5">
      <section class="mx-auto grid min-h-[calc(100vh-1.5rem)] max-w-7xl overflow-hidden rounded-[1.75rem] border border-sky-200 bg-white shadow-2xl sm:min-h-[calc(100vh-2.5rem)] lg:grid-cols-[minmax(0,1.12fr)_minmax(420px,.88fr)] dark:border-slate-700 dark:bg-slate-900">
        <div class="relative min-h-[300px] bg-vnpt-700 sm:min-h-[420px] lg:min-h-full">
          <img class="absolute inset-0 h-full w-full object-cover object-center" src="/static/login-hero.png" alt="Ảnh minh họa hệ thống quản trị nội bộ" />
          <div class="absolute inset-0 bg-gradient-to-t from-vnpt-950/55 via-vnpt-900/10 to-transparent"></div>
          <div class="absolute left-4 right-4 top-4 flex items-center justify-between gap-3 sm:left-6 sm:right-6 sm:top-6">
            <div class="flex items-center gap-3 rounded-2xl bg-white/95 px-3 py-2 shadow-lg">
              <div class="grid h-10 w-10 place-items-center rounded-xl bg-vnpt-600 text-[11px] font-extrabold text-white">VNPT</div>
              <div>
                <p class="text-sm font-extrabold leading-tight text-vnpt-950">BRCĐ Admin</p>
                <p class="text-[11px] font-semibold text-slate-600">VNPT Cần Thơ</p>
              </div>
            </div>
            <button id="theme-toggle" class="rounded-2xl border border-white/70 bg-white/95 px-4 py-2 text-sm font-extrabold text-vnpt-900 shadow-lg hover:bg-vnpt-50 dark:border-slate-600 dark:bg-slate-900 dark:text-sky-100 dark:hover:bg-slate-800" type="button" aria-label="Chuyển chế độ sáng tối">Sáng/Tối</button>
          </div>
          <div class="absolute bottom-0 left-0 right-0 p-5 text-white sm:p-7">
            <p class="text-xs font-extrabold uppercase tracking-[.22em] text-sky-100">Hệ thống quản trị nội bộ đặc biệt</p>
            <h1 class="mt-3 max-w-3xl text-3xl font-extrabold leading-tight tracking-[-.035em] sm:text-4xl lg:text-5xl">Quản trị BRCĐ tập trung, rõ ràng và an toàn.</h1>
          </div>
        </div>

        <div class="flex items-center justify-center bg-white px-4 py-8 sm:px-8 lg:px-10 dark:bg-slate-900">
          <div class="w-full max-w-md">
            <div class="mb-8">
              <p class="text-sm font-extrabold uppercase tracking-[.2em] text-vnpt-600 dark:text-sky-300">Cổng truy cập quản trị</p>
              <h2 class="mt-3 text-3xl font-extrabold tracking-[-.03em] text-slate-950 dark:text-white">Đăng nhập tài khoản nội bộ</h2>
              <p class="mt-3 text-base leading-7 text-slate-700 dark:text-slate-300">Dành cho quản trị và vận hành dữ liệu băng rộng cố định.</p>
            </div>

            <form id="login-form" class="grid gap-5">
              <label class="grid gap-2 text-sm font-extrabold text-slate-800 dark:text-slate-100">
                Tên đăng nhập
                <input class="form-control" name="username" autocomplete="username" required minlength="3" placeholder="Nhập tên đăng nhập" />
              </label>
              <label class="grid gap-2 text-sm font-extrabold text-slate-800 dark:text-slate-100">
                Mật khẩu
                <input class="form-control" name="password" type="password" autocomplete="current-password" required placeholder="Nhập mật khẩu" />
              </label>
              <button class="btn-primary w-full" type="submit">
                <span class="button-label">Đăng nhập</span>
                <span class="spinner"></span>
              </button>
              <div id="login-message" class="result hidden" role="alert"></div>
            </form>

            <div class="mt-6 rounded-2xl border border-sky-200 bg-vnpt-50 px-4 py-3 text-sm font-semibold text-vnpt-950 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">
              Hỗ trợ: <a class="font-extrabold text-vnpt-700 hover:underline dark:text-sky-300" href="tel:0949892585">094.989.2585 Quyền</a> · gọi/Zalo/Telegram
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="/static/login.js?v=4"></script>
  </body>
</html>

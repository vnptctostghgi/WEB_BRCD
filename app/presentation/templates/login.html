<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Đăng nhập · {{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              fontFamily: { sans: ["Be Vietnam Pro", "Inter", "ui-sans-serif", "system-ui"] },
              colors: { vnpt: { 50: "#effaff", 100: "#dff5ff", 500: "#0ea5e9", 600: "#0284c7", 700: "#0369a1", 900: "#0c4a6e", 950: "#082f49" } },
            },
          },
        },
      };
      if (localStorage.theme === "dark") document.documentElement.classList.add("dark");
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css?v=13" />
  </head>
  <body class="min-h-screen bg-sky-500 text-white antialiased dark:bg-slate-950 dark:text-white">
    <main class="min-h-screen p-3 sm:p-5">
      <section class="mx-auto grid min-h-[calc(100vh-1.5rem)] max-w-7xl overflow-hidden rounded-[1.75rem] border border-white/40 bg-sky-500 shadow-2xl sm:min-h-[calc(100vh-2.5rem)] lg:grid-cols-[minmax(0,1.12fr)_minmax(410px,.88fr)] dark:border-slate-700 dark:bg-slate-900">
        <div class="relative flex min-h-[360px] items-center justify-center bg-sky-600 p-3 sm:min-h-[520px] sm:p-5 lg:min-h-full dark:bg-slate-950">
          <img class="h-full max-h-[calc(100vh-3rem)] w-full object-contain" src="/static/login-hero.png" alt="Ảnh minh họa hệ thống quản trị nội bộ" />
        </div>

        <div class="flex items-center justify-center bg-sky-500 px-4 py-8 sm:px-8 lg:px-10 dark:bg-slate-900">
          <div class="flex w-full max-w-md flex-col">
            <div class="rounded-3xl border border-white/60 bg-white/12 p-6 shadow-xl sm:p-8 dark:border-slate-700 dark:bg-slate-950">
              <h1 class="text-3xl font-extrabold leading-tight tracking-[-.03em] text-white sm:text-4xl dark:text-white">Hệ thống quản trị nội bộ đặc biệt</h1>

              <form id="login-form" class="mt-8 grid gap-5">
                <label class="grid gap-2 text-sm font-extrabold text-white dark:text-slate-100">
                  Tên đăng nhập
                  <input class="form-control login-light-control" name="username" autocomplete="username" required minlength="3" placeholder="Nhập tên đăng nhập" />
                </label>
                <label class="grid gap-2 text-sm font-extrabold text-white dark:text-slate-100">
                  Mật khẩu
                  <input class="form-control login-light-control" name="password" type="password" autocomplete="current-password" required placeholder="Nhập mật khẩu" />
                </label>
                <button class="btn-primary login-submit w-full" type="submit">
                  <span class="button-label">Đăng nhập</span>
                  <span class="spinner"></span>
                </button>
                <div id="login-message" class="result hidden" role="alert"></div>
              </form>

              <div class="mt-6 rounded-2xl border border-white/50 bg-white/15 px-4 py-3 text-sm font-semibold text-white dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">
                Hỗ trợ: <a class="font-extrabold text-white underline-offset-4 hover:underline dark:text-sky-300" href="tel:0949892585">094.989.2585 Quyền</a> · gọi/Zalo/Telegram
              </div>
            </div>

            <button id="theme-toggle" class="mt-5 w-full rounded-2xl border border-white/60 bg-white/15 px-4 py-3 text-sm font-extrabold text-white hover:bg-white/25 dark:border-slate-700 dark:bg-slate-800 dark:text-sky-100 dark:hover:bg-slate-700" type="button" aria-label="Chuyển chế độ sáng tối">Chế độ sáng</button>
          </div>
        </div>
      </section>
    </main>
    <script src="/static/login.js?v=5"></script>
  </body>
</html>
